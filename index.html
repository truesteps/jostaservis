<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preload" as="image" href="/images/hero.webp" fetchpriority="high" />
    <title>JOSTA — Čištění vrtaných studní</title>
    <meta
      name="description"
      content="JOSTA — profesionální čištění a údržba vrtaných studní."
    />
  </head>
  <body>
    <div id="app"></div>
    <!--
      Static hidden form so Netlify's build-time bot detects the "contact" form
      (it does not run JS, so it can't see the Vue-rendered one). The real,
      interactive form in ContactSection.vue submits to this via AJAX. Field
      names MUST stay in sync with that component. Honeypot = bot-field.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
